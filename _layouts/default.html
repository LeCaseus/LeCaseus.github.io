<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8">

      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
      
      <title>{% if page.title %}{{ page.title }} · CV{% else %}Chezter Vargas{% endif %}</title>

      <style>
        .latest-readings,
        .about,
        .projects,
        .contact { opacity: 0; }
      </style>

      <link rel="preconnect" href="https://fonts.googleapis.com">
    
      <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    
      <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    </head>
  
    <body>
      <main>
        {{ content }}
      </main>
    
      <footer class="site-footer">
        <canvas class="footer-trace" id="footer-trace"></canvas>
        <span class="footer-readout">
          <span class="footer-status">SYS:OK</span>
          <span class="footer-sep">·</span>
          <span class="footer-name">CHEZTER VARGAS</span>
          <span class="footer-sep">·</span>
          <span class="footer-utc" id="footer-utc">UTC 00:00:00</span>
        </span>
      </footer>
  
      <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    </body>
  </html>
