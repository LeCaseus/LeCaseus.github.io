---
layout: default
title: Readings
---
<div class="blog-shell">

    <aside class="blog-sidebar">
        <div class="sidebar-header">
        <span class="blog-eyebrow">READINGS</span>
        <a href="{{ '/' | relative_url }}" class="readings-jump">← home</a>
        </div>

        <div class="blog-filters">
        <button class="filter-btn active" data-filter="all">all</button>
        <button class="filter-btn" data-filter="personal">personal</button>
        <button class="filter-btn" data-filter="coding">coding</button>
        <button class="filter-btn" data-filter="biomed">biomed</button>
        <button class="filter-btn" data-filter="gaming">gaming</button>
        <button class="filter-btn" data-filter="fitness">fitness</button>
        </div>

        <div class="blog-feed">
        {% for post in site.posts %}
        <a href="{{ post.url | relative_url }}"
            class="reading-row scroll-visible"
            data-category="{{ post.category }}"
            data-url="{{ post.url | relative_url }}">
            <span class="reading-date">{{ post.date | date: "%b %-d" }}</span>
            <span class="reading-tag">{{ post.category }}</span>
            <span class="reading-title">{{ post.title }}</span>
        </a>
        {% endfor %}
        </div>
    </aside>

    <main class="blog-content" id="blog-content">
        <div class="blog-content-empty" id="blog-empty">
        <svg width="200" height="18" viewBox="0 0 200 18" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,9 40,9 44,7.8 48,9 52,9 56,8.5 60,9 68,9 69.5,8 71,10 72.5,9 74,9 76,1 78,17 80,9 82,8 86,9 88,9 92,7.5 96,9 100,9 160,9 200,9" fill="none" stroke="#4ecba0" stroke-width="1.1"/>
        </svg>
        <p class="empty-label">SELECT A READING</p>
        </div>
    </main>

</div>
