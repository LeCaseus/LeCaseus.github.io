  <script>

    const POSTS = [
      {
        slug: "fine-tuning-my-own-ai",
        date: "Mar 30, 2025",
        tag: "coding",
        readTime: "7 min",
        title: "I tried to fine-tune my own AI but my laptop had other plans",
        lede: "An eight-gig RAM machine, a copy of Llama, and the slow education that ambition is not a substitute for VRAM.",
        body: `
      <p>At some point during my local AI journey, I stumbled upon what sounded like a rather ambitious idea. Instead of trying to wrap a general purpose chatbot in Python, and given that my hardware wasn't strong enough to run the larger models that actually give decent answers, why not just fine-tune a small language model to fit one of my specific needs? Like a coding assistant that would give me a base code structure for me to fill in with my own logic and variables. Now that sounded like a proper game plan, right?</p>
      <h2>The setup</h2>
      <p>So I started researching. I read about parameter-efficient fine-tuning methods, about datasets, about training loops. I started putting together what I'd need. The good thing was that most of these I just pulled from Hugging Face all together. The harder part was figuring out what models and data to actually pull. I started with an 8B parameter model which I knew could at least run fine on inference on my poor laptop, and paired it with a standard coding dataset so that the model could specialize in programming languages.</p>
      <p>And immediately, I hit a brick wall.</p>
      <h2>My laptop said no</h2>
      <p>Every time I tried to run the training process, there was always a parameter that was too extensive for my hardware and it just wouldn't execute the way I hoped. So I tweaked everything to work within my 4GB VRAM and even downgraded to a 3B parameter model, and still, even though I got it running, it took almost an hour or two just to train <em>0.01%</em> of the model.</p>
      <p>Yikes.</p>
      <p>Don't get me wrong. My laptop's RTX 3050 is not a bad GPU for most things. I can play high end AAA games at a solid 45 to 60 FPS most of the time, but I guess LLMs are just on a completely different league than your average video game. Fine-tuning, even on a small model, asks for a level of VRAM that the 3050 simply doesn't have. I think even 6 to 8GB would be the bare minimum to fine-tune the smallest models out there, and I'm sitting below that ceiling.</p>
      <blockquote>My hardware just said no. And I was genuinely frustrated by that. Not because I didn't understand the idea. Not because I didn't have a plan. Just because of the raw reality of what my machine could do.</blockquote>
      <h2>What comes next</h2>
      <p>After that, I decided to stop trying to do the most ambitious version of what I wanted, and just start thinking about the most meaningful version I could actually finish.</p>
    `
      },
      {
        slug: "maybe-were-all-vibing",
        date: "Mar 30, 2025",
        tag: "coding",
        readTime: "4 min",
        title: "Maybe we're all just vibe coding",
        lede: "On the strange new shape of programming when the compiler is also your collaborator.",
        body: `
      <p>After all that AI and LLM extravaganza, I decided to step back from that topic for now. I decided to focus on other projects that are better aligned to what I actually need in my day to day life, and to what will benefit the community. For now, I have taken on a new biomedical related project but I am not yet revealing what it is here in this post. I feel like it's barely just a version 1 of what I actually want to make and you might all laugh at me lol.</p>
      <p>Anyway, my approach to this project is to minimize the help of AI generation and just do my own thing really, and write the code the way I want it to. But that got me thinking deeply. <em>"Is what I am doing now actually different from vibe coding?"</em></p>
      <h2>AI with extra steps?</h2>
      <p>I still use AI when I build, although instead of asking for the whole code directly, I just ask it what libraries I should be using, or how do I build this function, or what does this concept mean, or if it can check my work for any errors that I might have overlooked. And I know what you're thinking. "Isn't that just vibe coding with extra steps?"</p>
      <p>And to be honest with you, I don't really think that it is, but the line is thinner than I had assumed.</p>
      <h2>Author vs. yes man</h2>
      <p>The way that I look at it, it's not just about whether or not we use AI. Rather, it's about <em>what you do with what it gives you</em>. When I first started coding CH3SH1RE, I was just accepting output. I was accepting a blob and approving code that I hadn't read or understood. I was running functions that I couldn't explain even in the simplest terms and I was patching errors by just generating replacements. At that time, the AI felt more like the author and I was just the yes man who passes everything.</p>
      <p>But now it's different. And I want you to really hear me out on this because my whole point might sound controversial. When I ask an AI to give me a list of possible libraries to use or to show me a function structure, isn't that just the same as asking other developers on Stack Overflow, or looking at code snippets on a random GitHub repo, or reading a library's documentation manually? I'm not asking AI for the whole code right away but rather asking it to fetch information like I would ask on a subreddit. I go in with a specific question. I get a specific answer. I take that answer and do something with it myself, whether I test it or break it on purpose, it doesn't really matter.</p>
      <h2>The only real measure</h2>
      <p>And maybe that's the only real measure of whether you're actually learning. Not where the information came from, but what you can do with it once the tab is closed. If I can close the conversation and still write the function, then cool, something stuck. If I can't, then I was just vibe coding in slow motion.</p>
      <p>And look, you might argue that I'm being inefficient, that by now I could have had a fully working app already. And yeah, fair enough. But it doesn't bother me. I'd rather be slow and actually get something out of it than be fast and end up staring at code I don't recognize again.</p>
      <blockquote>CH3SH1RE had to happen first. The vibe coded version, the hollow confidence, the moment of looking at my own code and not recognizing it. That was the education. Everything after that is just me actually showing up to class.</blockquote>
    `
      },
      {
        slug: "the-rabbit-hole",
        date: "Mar 27, 2025",
        tag: "coding",
        readTime: "6 min",
        title: "Falling down the rabbit hole of local LLM deployment",
        lede: "A field report from someone who wanted privacy and ended up with a homelab.",
        body: `
      <p>After realizing that vibe coding wasn't the way to actually learn programming (even though it's just a hobby!), I started looking for different options and tools to help me get started with deploying AI locally on my laptop.</p>
      <h2>LM Studio</h2>
      <p>The first and most beginner friendly option was of course LM Studio. It was as simple as installing any regular <code>.exe</code> program, and once I booted it up I was greeted with a nice and clean UI. Personally though, I didn't like it. I thought it looked worse than ChatGPT in terms of minimalism, which is saying something. To be fair, it wasn't inherently bad because all the extra stuff displayed around the screen was there to let you customize how the AI model behaved. But after a little bit of exploring, I decided to move on.</p>
      <h2>Ollama</h2>
      <p>Next up was Ollama, which I'd say sits somewhere between LM Studio and llama.cpp. For one, it had its own interface that looked a lot like ChatGPT, but I could also control it through powershell — basically just a text based window where you type instructions directly into your computer instead of clicking around a screen (think like hackerman). This was also the point where I discovered a whole world of different AI models. Google's Gemma, Microsoft's Phi, Meta's Llama. And as controversial as AI is, there was an entire community of open models over at <em>Hugging Face</em>, which is kind of like GitHub but for AI models, and I had no idea that world even existed. Though, with my limited hardware I could only play around with models under 9B parameters with quantization, but that was still enough to go down a pretty deep rabbit hole.</p>
      <p>The thing I really didn't like about Ollama though was that it came with its own ready to use UI (I wanted to make my own, alright?!) and that it lived in my taskbar. And anything sitting in my taskbar is usually a red flag for memory hogging. So I moved on again.</p>
      <h2>llama.cpp</h2>
      <p>This time I found llama.cpp, which I believe is the backbone that most of the local AI ecosystem quietly depends on. This one was a bit more difficult to navigate. I had to launch either <code>llama-cli.exe</code> for a CLI experience (which I first thought was a shortcut for "client") or <code>llama-server.exe</code> which had its own UI like the other two. Naturally, guess which one I picked. I went with the CLI because I didn't want another pre-built interface. But even then, the same problem was there. All the interesting work was already done for me. The model selection, the quantization, the serving, the interface — all of it was handled. I wasn't a builder. I was just another user of a local alternative to ChatGPT, and I hated that. I'd gone from vibe coding my own assistant to plug and playing someone else's.</p>
      <h2>Where I landed</h2>
      <p>So by this point I was set on building my own Python wrapper around llama.cpp to actually build something, customize the model, and understand how they work and process data. I needed to get my hands into the pipeline.</p>
      <p>Don't get me wrong. These tools are not bad for general use if you just want a quick and private alternative to the big AI apps. They just weren't for me.</p>
    `
      },
      {
        slug: "i-started-vibe-coding",
        date: "Mar 26, 2025",
        tag: "coding",
        readTime: "5 min",
        title: "I started vibe coding a month ago, and I understood nothing",
        lede: "A confession from someone whose code now works, but who would struggle to defend it in a job interview.",
        body: `
      <p>A month ago, during early March, I had this urge to stop supporting commercial AI chatbots because for one, we all know the computing power it takes affects our environment negatively, and two, I heavily dislike AI generated slop and soulless content on this dead internet. Sooooo…</p>
      <p>I formed a thought. What if I just run my own AI chat assistant locally on my laptop? That way, I could keep my data private, and take a small stand against AI slop destroying our environment. But I had no idea where to start. I did have some experience writing C/C++ from my embedded systems days back in university, so I wasn't completely new to programming. And because of that, I also wasn't new to the concept of <em>vibe coding</em>.</p>
      <h2>What is vibe coding?</h2>
      <p>It's a term floating around the developer space right now where you describe what you want to an AI, it generates the code, you tweak things until they seem to work, and you ship it. You're not really writing code so much as <em>conducting</em> it. Pointing at things and saying more of this, less of that.</p>
      <p>Ironic, fighting AI slop with AI. But eh, I had to start somewhere. And at the time, I felt super productive about it. I had a working Python stack faster than I ever could have managed on my own. There were moving parts — a Python backend, an SQLite database, a conversational interface — and they fit together in ways that looked, from the outside, like something I had built. If you go to my <a href="https://github.com/LeCaseus" target="_blank" rel="noopener">CH3SH1RE repo</a> over at GitHub, you'd see the whole thing right from the initial commit. It was built so fast that I genuinely thought I was finally gonna be rid of all those commercial AI apps for good. ChatGPT, Gemini, Copilot, gone. I had already deleted all my accounts.</p>
      <h2>The floor I hadn't checked</h2>
      <p>But here's the thing about vibe coding a project you don't fully understand: you can <em>feel</em> it. Not immediately, but eventually. You start noticing that you can't explain why something works. You can't predict what will break when you change something. Heck, I even noticed that Cheshire's responses were weirdly generic and I didn't know why. The code started to feel less like something I made and more like something that just happened to me.</p>
      <p>I remember looking at a chunk of the CH3SH1RE codebase and realising I genuinely could not tell you what it was doing line by line. I had approved it. I had run it. But I hadn't read it, not really. I'd read it the way you read the terms and conditions of a software update:</p>
      <blockquote>Scanning for anything alarming, then clicking accept.</blockquote>
      <p>That was the moment I knew something had to change.</p>
      <p>I didn't know yet what the alternative looked like. But I knew that building something I couldn't explain felt like standing on a floor I hadn't checked the weight rating on. Functional, until it isn't.</p>
    `
      },
      {

        body: `
      <p>This is my first ever blog post. Well, technically it's the first I ever made but not quite the first I'm posting now. This is a revision or a repost you might say, of my first blog entry. See, I had this blog site on Wordpress a while ago and it was called <em>CTRL+chill</em>. I don't really know the direction I was going for at the time but I had this idea. I wanted to write something that people will actually read. And thinking about it I have just now realized that most people don't actually read long articles.</p>
      <h2>On the dead internet</h2>
      <p>But anyway, one of the first few words in my original post was:</p>
      <blockquote>I've been feeling this itch to create something real, something meaningful, something that is actually worth creating.</blockquote>
      <p>Because in the world we live in today, there is no doubt that the dead internet theory is actually coming true. Everything nowadays is just a bunch of SEO optimization and spouting out AI nonsense. Countless posts that are just generated by AI. The captions, the posts, even the comments sometimes. Honestly, I can't tell anymore if they were written by a really good writer or just AI.</p>
      <p>It feels like people are just posting for the sake of the money, instead of posting something that they are actually passionate about. I certainly didn't want to make my future content that way, because I felt like it was taking away the creativity and the passion that other content creators have, and it is an <em>infestation</em> to the platforms to just generate mass media and profit off of it.</p>
      <h2>Where I stand on AI</h2>
      <p>Don't get me wrong, I do think that AI will be the path to the future in terms of like, technological advancements and embedded systems, but I will forever dislike the people who uses AI as a way to generate slop content and being a nuisance to multiple social platforms.</p>
      <h2>Why I'm here</h2>
      <p>That's why when I chose to start this blogging journey, I wanted to write with a passion; To write what I actually feel like writing. These weird, little blogs. The kind that people will actually look for and stay, not because of algorithms and whatever that SEO nonsense was about. And I hope that whoever might stay to read my stuff, as cringey as it may be, might stay to support me, because at least I'm <em>real</em>. Not some robot that spits out "relatable" content.</p>
    `

    const POST_BY_SLUG = Object.fromEntries(POSTS.map(p => [p.slug, p]));

    /* ──────────────────────────────────────────────────────────────────────
       Theme + clock (lightweight, mirrored from main.js)
       ────────────────────────────────────────────────────────────────────── */
    const root = document.documentElement;
    const storedTheme = localStorage.getItem('cv.theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.setAttribute('data-theme', storedTheme || (prefersDark ? 'dark' : 'light'));
    const themeBtn = document.querySelector('[data-theme-toggle]');
    const refreshThemeBtn = () => {
      if (!themeBtn) return;
      themeBtn.textContent = root.getAttribute('data-theme') === 'dark' ? '☼ LIGHT' : '☾ DARK';
    };
    refreshThemeBtn();
    themeBtn?.addEventListener('click', () => {
      const t = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', t);
      localStorage.setItem('cv.theme', t);
      refreshThemeBtn();
    });

    const tickClock = () => {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const s = `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
      document.querySelectorAll('[data-clock]').forEach(el => el.textContent = s);
    };
    tickClock();
    setInterval(tickClock, 1000);

    /* ──────────────────────────────────────────────────────────────────────
       List rendering + filter + search
       ────────────────────────────────────────────────────────────────────── */
    const listEl = document.querySelector('[data-list]');
    const visibleCountEl = document.querySelector('[data-visible-count]');
    let currentFilter = 'all';
    let currentSearch = '';
    let currentSlug = null;

    const renderList = () => {
      const q = currentSearch.trim().toLowerCase();
      const filtered = POSTS.filter(p => {
        if (currentFilter !== 'all' && p.tag !== currentFilter) return false;
        if (q && !(p.title.toLowerCase().includes(q) || p.lede.toLowerCase().includes(q))) return false;
        return true;
      });
      listEl.innerHTML = filtered.map((p, i) => `
    <li>
      <a class="entry ${p.slug === currentSlug ? 'active' : ''}" href="#/${p.slug}" data-slug="${p.slug}">
        <div>
          <div class="meta-row"><span>${p.date}</span><span class="tag">${p.tag}</span></div>
          <div class="ttl">${p.title}</div>
        </div>
        <div class="n">${String(POSTS.indexOf(p) + 1).padStart(2, '0')}</div>
      </a>
    </li>
  `).join('') || '<li class="empty">no entries</li>';

      visibleCountEl.textContent = `${filtered.length} / ${POSTS.length}`;
    };

    document.querySelectorAll('[data-filters] button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filters] button').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        currentFilter = btn.dataset.filter;
        renderList();
      });
    });
    document.querySelector('[data-search]').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderList();
    });

    /* ──────────────────────────────────────────────────────────────────────
       Reader rendering
       ────────────────────────────────────────────────────────────────────── */
    const readerBody = document.querySelector('[data-reader-body]');
    const renderPost = (slug) => {
      const post = POST_BY_SLUG[slug] || POSTS[0];
      currentSlug = post.slug;

      const idx = POSTS.indexOf(post);
      const prev = idx > 0 ? POSTS[idx - 1] : null;
      const next = idx < POSTS.length - 1 ? POSTS[idx + 1] : null;

      readerBody.innerHTML = `
    <header class="header">
      <div class="meta">
        <span>${post.date}</span>
        <span class="dot"></span>
        <span class="tag">${post.tag}</span>
        <span class="dot"></span>
        <span>${post.readTime} read</span>
        <span class="dot"></span>
        <span>entry ${String(idx + 1).padStart(2, '0')} / ${String(POSTS.length).padStart(2, '0')}</span>
      </div>
      <h1 class="post-title">${post.title}</h1>
      <p class="lede">${post.lede}</p>
    </header>
    <div class="prose-body">${post.body}</div>
    <div class="post-footer">
      <div class="prev">
        ${prev ? `<a href="#/${prev.slug}">
          <span class="label">← previous</span>
          <span class="ttl">${prev.title}</span>
        </a>` : ''}
      </div>
      <div class="next">
        ${next ? `<a href="#/${next.slug}">
          <span class="label">next →</span>
          <span class="ttl">${next.title}</span>
        </a>` : ''}
      </div>
    </div>
  `;

      renderList(); // refresh active state
      document.getElementById('reader').scrollTo?.({top: 0});
      window.scrollTo({top: 0, behavior: 'smooth'});
    };

    /* ──────────────────────────────────────────────────────────────────────
       Routing — read slug from hash
       ────────────────────────────────────────────────────────────────────── */
    const slugFromHash = () => {
      const h = location.hash.replace(/^#\/?/, '').trim();
      return POST_BY_SLUG[h] ? h : POSTS[0].slug;
    };
    window.addEventListener('hashchange', () => renderPost(slugFromHash()));
    listEl.addEventListener('click', (e) => {
      const a = e.target.closest('[data-slug]');
      if (!a) return;
      // let the hashchange handler do the rest
    });

    /* ──────────────────────────────────────────────────────────────────────
       Mini reader-pulse — bound to scroll velocity inside the article
       ────────────────────────────────────────────────────────────────────── */
    const pulsePath = document.getElementById('pulse-path');
    const W = 600, H = 36, BASE = H * 0.55;
    let ppts = [];
    let pcursor = 0;
    let pIntensity = 1;
    let pLastY = window.scrollY, pLastT = performance.now(), pEnergy = 0;

    const pBeat = (k) => [
      [8, 0], [3, -1 * k], [5, 1 * k], [3, 0], [6, 0],
      [2, -2 * k], [2, 6 * k], [2, -16 * k], [2, 12 * k], [2, -2 * k],
      [6, 0], [4, -1 * k], [6, 2 * k], [Math.max(6, 18 / Math.max(1, k)), 0],
    ];
    const buildPBeat = () => {
      let x = pcursor, y = BASE;
      for (const [dx, dy] of pBeat(pIntensity)) {x += dx; y += dy; ppts.push([x, y]);}
      pcursor = x + Math.random() * 6;
    };
    while (pcursor < W * 1.2) buildPBeat();

    let pScroll = 0, pLast = performance.now();
    const pLoop = (t) => {
      const dt = (t - pLast) / 1000; pLast = t;
      const target = 1 + Math.min(1.4, pEnergy * 0.018);
      pIntensity += (target - pIntensity) * Math.min(1, dt * 4);
      pEnergy *= Math.max(0, 1 - dt * 2.2);
      pScroll += 60 * (1 + (pIntensity - 1) * 0.5) * dt;
      while (ppts.length > 4 && ppts[1][0] - pScroll < -20) ppts.shift();
      while (pcursor - pScroll < W * 1.2) buildPBeat();
      let d = '';
      for (let i = 0; i < ppts.length; i++) {
        d += (i ? 'L' : 'M') + (ppts[i][0] - pScroll).toFixed(1) + ' ' + ppts[i][1].toFixed(1) + ' ';
      }
      pulsePath.setAttribute('d', d);
      requestAnimationFrame(pLoop);
    };
    requestAnimationFrame(pLoop);

    window.addEventListener('scroll', () => {
      const now = performance.now();
      const dy = Math.abs(window.scrollY - pLastY);
      const dt = Math.max(16, now - pLastT);
      pEnergy = Math.min(120, pEnergy * 0.6 + (dy / dt) * 60);
      pLastY = window.scrollY; pLastT = now;

      // reading-progress bar
      const doc = document.documentElement;
      const scrollable = doc.scrollHeight - doc.clientHeight;
      const pct = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
      document.getElementById('read-progress-bar').style.height = pct + '%';
    }, {passive: true});

    /* ── Boot ─────────────────────────────────────────────────────────────── */
    renderList();
    renderPost(slugFromHash());
    document.querySelector('[data-post-count]').textContent = POSTS.length;
  </script>

</body>
